name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm test

      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          PACKAGE_TGZ="$(npm pack --json | node -e "let input=''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));")"
          echo "tgz=${PACKAGE_TGZ}" >> "${GITHUB_OUTPUT}"

      - name: Install packed CLI globally
        run: npm install -g "${{ steps.pack.outputs.tgz }}"

      - name: Smoke test CLI on POSIX
        if: runner.os != 'Windows'
        run: tiangong-wiki --help

      - name: Smoke test CLI on Windows native shell
        if: runner.os == 'Windows'
        shell: pwsh
        run: tiangong-wiki.cmd --help
